    const USER_ID = "@I36169831442@";

    const nodes = new vis.DataSet(rawNodes);
    const edges = new vis.DataSet(rawEdges);

    const container = document.getElementById('network');
    const network = new vis.Network(container, { nodes, edges }, {
      physics: {
        enabled: true,
        stabilization: { iterations: 380, updateInterval: 30 },
        barnesHut: {
          gravitationalConstant: -9500,
          centralGravity: 0.08,
          springLength: 105,
          springConstant: 0.04,
          damping: 0.82,
          avoidOverlap: 0.1
        },
        solver: 'barnesHut'
      },
      nodes: { font: { size: 10 } },
      edges: { width: 0.65, smooth: { type: 'continuous' } },
      interaction: { hover: true, navigationButtons: true, keyboard: true }
    });

    function searchFocus() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      if (!q) return;
      let match = nodes.get().find(n => n.label.toLowerCase() === q);
      if (!match) match = nodes.get().find(n => n.label.toLowerCase().includes(q));
      if (match) {
        network.selectNodes([match.id]);
        network.focus(match.id, { scale: 1.7, animation: { duration: 900 } });
        highlightNeighbors(match.id);
      }
    }

    function highlightNeighbors(nodeId) {
      const neighbors = network.getConnectedNodes(nodeId);
      network.selectNodes([nodeId, ...neighbors]);
    }

    network.on("click", params => {
      if (params.nodes.length) highlightNeighbors(params.nodes[0]);
    });

    function stabilize() { network.stabilize(250); }
    function resetView() { network.fit({ animation: true }); }
    function randomFocus() {
      const all = nodes.get();
      const r = all[Math.floor(Math.random()*all.length)];
      network.selectNodes([r.id]);
      network.focus(r.id, { scale: 1.6, animation: true });
      highlightNeighbors(r.id);
    }

    function centerOnMe() {
      const u = nodes.get(USER_ID);
      if (u) {
        network.selectNodes([USER_ID]);
        network.focus(USER_ID, { scale: 2.1, animation: { duration: 1100, easingFunction: 'easeInOutQuad' } });
        highlightNeighbors(USER_ID);
      } else {
        // fallback search by name
        const match = nodes.get().find(n => /michael.*thomson/i.test(n.label));
        if (match) {
          network.selectNodes([match.id]);
          network.focus(match.id, { scale: 1.9, animation: true });
          highlightNeighbors(match.id);
        }
      }
    }

    document.getElementById('search').addEventListener('keypress', e => {
      if (e.key === 'Enter') searchFocus();
    });

    // Auto-center on YOU (Michael Thomson b1992) once mostly stable
    network.once('stabilizationIterationsDone', () => {
      network.fit({ animation: { duration: 600 } });
      setTimeout(() => {
        const u = nodes.get(USER_ID);
        if (u) {
          network.selectNodes([USER_ID]);
          network.focus(USER_ID, {
            scale: 2.0,
            animation: { duration: 1400, easingFunction: 'easeInOutQuad' }
          });
          // light neighbor pulse
          setTimeout(() => highlightNeighbors(USER_ID), 650);
        }
      }, 280);
    });

    window.addEventListener('resize', () => network.fit());
    // keyboard hint: press 'm' for me
    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'm') centerOnMe();
    });
